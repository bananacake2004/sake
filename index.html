<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お酒配合コンシェルジュ Pro Ultra</title>
    <style>
        :root { --main: #4a90e2; --accent: #f39c12; --bg: #f0f2f5; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); padding: 15px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .section { margin-bottom: 15px; padding: 15px; border: 1px solid #f0f0f0; border-radius: 16px; background: #fafafa; }
        label { display: block; font-size: 0.8rem; font-weight: 700; color: #555; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; border: 2px solid #eef0f2; border-radius: 12px; box-sizing: border-box; font-size: 16px; transition: 0.2s; }
        input:focus { border-color: var(--main); outline: none; background: white; }
        .btn-group { display: flex; gap: 8px; margin: 12px 0; }
        .btn-search { flex: 3; background: #333; color: white; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
        .btn-google { flex: 1; background: #ffffff; color: #ea4335; border: 2px solid #ea4335; padding: 10px; border-radius: 10px; cursor: pointer; font-size: 0.75rem; font-weight: 600; }
        .btn-calc { background: var(--main); color: white; padding: 18px; width: 100%; border-radius: 14px; border: none; font-size: 1.2rem; cursor: pointer; font-weight: bold; margin-top: 10px; box-shadow: 0 4px 12px rgba(74, 144, 226, 0.3); }
        #status { font-size: 0.85rem; color: #e67e22; text-align: center; margin-bottom: 12px; min-height: 1.4em; padding: 8px; border-radius: 8px; background: #fff9f0; border: 1px solid #ffe8cc; }
        .result-box { display: none; margin-top: 20px; padding: 20px; border-radius: 16px; background: #eef6ff; border: 1px solid #d0e7ff; color: #2c3e50; }
        .recovery-box { margin-top: 15px; padding: 20px; background: #fffcf0; border-radius: 16px; border: 1px solid #ffecb3; display: none;}
        .hint { font-size: 0.7rem; color: #999; margin-top: 4px; }
    </style>
</head>
<body>

<div class="app-container">
    <h2 style="text-align:center; color:var(--main); margin-top:0; letter-spacing: -1px;">🍸 Drink Mixer Ultra</h2>
    <div id="status">銘柄を入力して解析ボタンをタップ</div>

    <div class="section">
        <label>お酒B (原酒 / ベース)</label>
        <input type="text" id="nameB" placeholder="ほろよい, アサヒスーパードライ...">
        <div class="btn-group">
            <button class="btn-search" onclick="deepSearch('B')">🔍 ネット解析</button>
            <button class="btn-google" onclick="manualGoogle('B')">Google</button>
        </div>
        <div style="display:flex; gap:10px;">
            <div style="flex:1;"><label>度数(%)</label><input type="number" id="percentB" step="0.1" value="40"></div>
            <div style="flex:1;"><label>量(ml)</label><input type="number" id="amountB" value="30"></div>
        </div>
    </div>

    <div class="section">
        <label>割り材C (ファンタ, 炭酸水...)</label>
        <input type="text" id="nameC" placeholder="ファンタグレープ, コーラ...">
        <div class="btn-group">
            <button class="btn-search" onclick="deepSearch('C')">🔍 ネット解析</button>
            <button class="btn-google" onclick="manualGoogle('C')">Google</button>
        </div>
        <div style="display:flex; gap:10px;">
            <div style="flex:1;"><label>度数(%)</label><input type="number" id="percentC" step="0.1" value="0"></div>
            <div style="flex:1;"><label>目標(%)</label><input type="number" id="targetA" step="0.1" value="7"></div>
        </div>
    </div>

    <button class="btn-calc" onclick="calculate()">配合比を計算する</button>

    <div id="result" class="result-box"></div>

    <div id="recovery" class="recovery-box">
        <label style="color:var(--accent)">【修正】Cを入れすぎた量 (ml)</label>
        <input type="number" id="deltaD" placeholder="例: 20" oninput="calculateRecovery()">
        <div id="recoveryText" style="margin-top:12px; font-weight:bold; color:#d35400; font-size: 1.1rem;"></div>
    </div>
</div>

<script>
// 確実に度数を補完するための内部リスト
const masterDB = {
    "竹鶴": 43, "呉春": 15.5, "ファンタ": 0, "コーラ": 0, "三ツ矢サイダー": 0, 
    "オレンジジュース": 0, "烏龍茶": 0, "午後の紅茶": 0, "水": 0, "炭酸水": 0
};

function manualGoogle(type) {
    const name = document.getElementById('name' + type).value;
    if(!name) return;
    window.open(`https://www.google.com/search?q=${encodeURIComponent(name + " 度数 %")}`, '_blank');
}

async function deepSearch(type) {
    const name = document.getElementById('name' + type).value.trim();
    const status = document.getElementById('status');
    if (!name) return;

    status.innerText = `⏳ 「${name}」をスキャン中...`;

    // 1. 内部DBチェック（ファンタや竹鶴、呉春をここで確実に救済）
    for (let key in masterDB) {
        if (name.includes(key)) {
            document.getElementById('percent' + type).value = masterDB[key];
            status.innerText = `✅ DBより ${name} (${masterDB[key]}%) を適用`;
            return;
        }
    }

    // 2. ネット解析（Wikipedia API）
    try {
        const url = `https://ja.wikipedia.org/w/api.php?action=query&format=json&origin=*&prop=extracts&explaintext&exchars=1000&titles=${encodeURIComponent(name)}`;
        const res = await fetch(url);
        const data = await res.json();
        const pages = data.query.pages;
        const text = pages[Object.keys(pages)[0]].extract || "";

        // 数値抽出 (例: 15%, 15.5度, 40 vol%)
        const match = text.match(/(\d+(\.\d+)?)\s?([%％度]|vol)/);
        if (match) {
            let val = parseFloat(match[1]);
            // アルコール度数として妥当な範囲(0-96%)かチェック
            if (val >= 0 && val <= 96) {
                document.getElementById('percent' + type).value = val;
                status.innerText = `✅ 解析結果: ${val}%`;
                return;
            }
        }
        
        // 3. 解析不能な場合、清涼飲料水キーワードがあれば0にする
        const softDrinks = ["ソーダ", "ジュース", "茶", "水", "レモン", "グレープ", "メロン"];
        if (softDrinks.some(s => name.includes(s))) {
            document.getElementById('percent' + type).value = 0;
            status.innerText = `💡 飲料水と判断 (0%)`;
        } else {
            status.innerText = "❓ 不明。Googleボタンで確認してください";
        }
    } catch (e) { status.innerText = "⚠️ 接続失敗"; }
}

function calculate() {
    const pB = parseFloat(document.getElementById('percentB').value);
    const pC = parseFloat(document.getElementById('percentC').value);
    const target = parseFloat(document.getElementById('targetA').value);
    const amtB = parseFloat(document.getElementById('amountB').value);
    
    if (target <= pC || target >= pB) {
        alert("目標はBとCの間の数値にしてください"); return;
    }

    const d = amtB * (pB - target) / (target - pC);
    const res = document.getElementById('result');
    res.style.display = 'block';
    res.innerHTML = `🏁 <strong>${target}%にするには：</strong><br>割り材を <strong>${d.toFixed(1)} ml</strong> 注いでください。`;
    document.getElementById('recovery').style.display = 'block';
    window.calcData = { pB, pC, target };
}

function calculateRecovery() {
    const deltaD = parseFloat(document.getElementById('deltaD').value);
    if (!deltaD || !window.calcData) return;
    const { pB, pC, target } = window.calcData;
    const deltaE = deltaD * (target - pC) / (pB - target);
    document.getElementById('recoveryText').innerHTML = `原酒(B)を <strong>${deltaE.toFixed(1)} ml</strong> 追加！`;
}
</script>
</body>
</html>
