<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>お酒配合コンシェルジュ Pro Max</title>
    <style>
        :root { --main: #4a90e2; --accent: #f39c12; --bg: #f5f7fa; }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #edf2f7; border-radius: 12px; }
        input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 16px; margin-top: 5px; }
        .btn-search { background: #333; color: white; padding: 10px; border-radius: 8px; width: 100%; margin: 10px 0; border: none; cursor: pointer; font-weight: bold; }
        .btn-calc { background: var(--main); color: white; padding: 18px; width: 100%; border-radius: 12px; border: none; font-size: 1.2rem; cursor: pointer; font-weight: bold; }
        #status { font-size: 0.8rem; color: #e67e22; text-align: center; margin-bottom: 10px; min-height: 1.2em; }
        .result-box { display: none; margin-top: 20px; padding: 20px; border-radius: 12px; background: #e7f3ff; border-left: 6px solid var(--main); }
    </style>
</head>
<body>

<div class="app-container">
    <h2 style="text-align:center; color:var(--main);">🍸 お酒計算 (検索特化型)</h2>
    <div id="status"></div>

    <div class="section">
        <label>お酒の名前 (B)</label>
        <input type="text" id="nameB" placeholder="ほろよい, 山崎, 氷結...">
        <button class="btn-search" onclick="searchDDG('B')">DuckDuckGoで度数を探す</button>
        <div style="display:flex; gap:10px;">
            <div style="flex:1;"><label>度数(%)</label><input type="number" id="percentB" step="0.1" value="40"></div>
            <div style="flex:1;"><label>量(ml)</label><input type="number" id="amountB" value="30"></div>
        </div>
    </div>

    <div class="section">
        <label>割り材 (C)</label>
        <input type="text" id="nameC" placeholder="炭酸水, コーラ...">
        <button class="btn-search" onclick="searchDDG('C')">DuckDuckGoで度数を探す</button>
        <div style="display:flex; gap:10px;">
            <div style="flex:1;"><label>度数(%)</label><input type="number" id="percentC" step="0.1" value="0"></div>
            <div style="flex:1;"><label>目標(%)</label><input type="number" id="targetA" step="0.1" value="7"></div>
        </div>
    </div>

    <button class="btn-calc" onclick="calculate()">黄金比を計算</button>
    <div id="result" class="result-box"></div>
</div>

<script>
// DuckDuckGoのAPI（インスタント回答）を利用
async function searchDDG(type) {
    const name = document.getElementById('name' + type).value;
    const status = document.getElementById('status');
    if (!name) return;

    status.innerText = "🔍 DuckDuckGoで検索中...";

    try {
        // DuckDuckGoのAPIを叩く (CORSを回避できる形式)
        const response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(name)}&format=json&no_html=1&skip_disambig=1`);
        const data = await response.json();
        
        // 検索結果の概要(Abstract)か、関連トピックから文字列を合体
        let sourceText = (data.AbstractText + data.Heading + (data.RelatedTopics[0]?.Text || "")).toLowerCase();
        
        // 正規表現で「〇〇%」または「〇〇度」を抽出
        // ほろよい等は3%なので、その周辺の数字を探す
        const abvMatch = sourceText.match(/(\d+(\.\d+)?)\s?([%％]|度)/);
        
        if (abvMatch) {
            document.getElementById('percent' + type).value = abvMatch[1];
            status.innerText = `✅ ${name} の度数を ${abvMatch[1]}% と判定しました`;
        } else {
            // 見つからない場合のバックアップ（よくあるお酒）
            const backup = {"ほろよい": 3, "ストロング": 9, "氷結": 5, "ハイボール": 7};
            let found = false;
            for(let key in backup) {
                if(name.includes(key)) {
                    document.getElementById('percent' + type).value = backup[key];
                    status.innerText = `💡 プリセットから ${backup[key]}% を適用しました`;
                    found = true; break;
                }
            }
            if(!found) status.innerText = "❌ 度数が見つかりませんでした。手入力してください。";
        }
    } catch (e) {
        status.innerText = "⚠️ 接続エラーが発生しました";
    }
}

function calculate() {
    const pB = parseFloat(document.getElementById('percentB').value);
    const pC = parseFloat(document.getElementById('percentC').value);
    const target = parseFloat(document.getElementById('targetA').value);
    const amtB = parseFloat(document.getElementById('amountB').value);
    const d = amtB * (pB - target) / (target - pC);
    
    const res = document.getElementById('result');
    res.style.display = 'block';
    res.innerHTML = `<strong>完璧です！</strong><br>割り材を <strong>${d.toFixed(1)} ml</strong> 注げば ${target}% になります。`;
}
</script>
</body>
</html>
